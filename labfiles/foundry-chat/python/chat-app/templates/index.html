<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Prep Coach</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 760px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: -0.02em;
        }

        .header p {
            margin-top: 8px;
            font-size: 0.95rem;
            color: #64748b;
        }

        /* Panels */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Setup panel */
        .card {
            background: #1e2130;
            border: 1px solid #2d3148;
            border-radius: 16px;
            padding: 32px;
        }

        .card label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .card textarea {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
            padding: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .card textarea:focus {
            border-color: #6366f1;
        }

        .card .field {
            margin-bottom: 20px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-msg {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 14px;
            min-height: 20px;
        }

        /* Interview panel */
        .progress-bar-wrap {
            margin-bottom: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 4px;
            background: #2d3148;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #6366f1;
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .chat-window {
            background: #1e2130;
            border: 1px solid #2d3148;
            border-radius: 16px;
            padding: 24px;
            min-height: 360px;
            max-height: 480px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .bubble {
            max-width: 78%;
            padding: 13px 17px;
            border-radius: 14px;
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .bubble.interviewer {
            background: #2d3148;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bubble.candidate {
            background: #6366f1;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        .answer-area {
            display: flex;
            gap: 10px;
        }

        .answer-area textarea {
            flex: 1;
            background: #1e2130;
            border: 1px solid #2d3148;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
            padding: 13px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            height: 80px;
        }

        .answer-area textarea:focus {
            border-color: #6366f1;
        }

        .btn-send {
            padding: 0 22px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        .btn-send:hover {
            background: #4f46e5;
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Debrief panel */
        .debrief-card {
            background: #1e2130;
            border: 1px solid #2d3148;
            border-radius: 16px;
            padding: 32px;
        }

        .debrief-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d3148;
        }

        .debrief-body {
            font-size: 0.92rem;
            line-height: 1.75;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        .btn-restart {
            margin-top: 28px;
            width: 100%;
            padding: 13px;
            background: transparent;
            color: #6366f1;
            border: 1px solid #6366f1;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-restart:hover {
            background: #6366f1;
            color: #fff;
        }

        /* Cursor blink for streaming */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #e2e8f0;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 14px;
            background: #2d3148;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>Interview Prep Coach</h1>
            <p>Powered by Azure AI Foundry and GPT-4.1</p>
        </div>

        <!-- Setup Panel -->
        <div id="panel-setup" class="panel active">
            <div class="card">
                <div class="field">
                    <label>Your Resume</label>
                    <textarea id="resume" rows="8" placeholder="Paste your resume text here..."></textarea>
                </div>
                <div class="field">
                    <label>Job Description</label>
                    <textarea id="jd" rows="6" placeholder="Paste the job description here..."></textarea>
                </div>
                <button class="btn-primary" id="btn-start" onclick="startSession()">
                    Start Interview
                </button>
                <div class="status-msg" id="setup-status"></div>
            </div>
        </div>

        <!-- Interview Panel -->
        <div id="panel-interview" class="panel">
            <div class="progress-bar-wrap">
                <div class="progress-label">
                    <span>Interview Progress</span>
                    <span id="turn-label">0 / 6</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="chat-window" id="chat-window"></div>

            <div class="answer-area">
                <textarea id="answer-input" placeholder="Type your answer here..."
                    onkeydown="handleKey(event)"></textarea>
                <button class="btn-send" id="btn-send" onclick="submitAnswer()">Send</button>
            </div>
        </div>

        <!-- Debrief Panel -->
        <div id="panel-debrief" class="panel">
            <div class="debrief-card">
                <h2>Interview Debrief</h2>
                <div class="debrief-body" id="debrief-body"></div>
                <button class="btn-restart" onclick="restart()">Start New Session</button>
            </div>
        </div>

    </div>

    <script>
        let sessionId = null;
        let turnCount = 0;
        const MAX_TURNS = 6;

        function showPanel(name) {
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            document.getElementById("panel-" + name).classList.add("active");
        }

        function setStatus(msg) {
            document.getElementById("setup-status").textContent = msg;
        }

        function updateProgress(turn) {
            document.getElementById("turn-label").textContent = `${turn} / ${MAX_TURNS}`;
            document.getElementById("progress-fill").style.width = `${(turn / MAX_TURNS) * 100}%`;
        }

        function addBubble(role, text = "") {
            const chat = document.getElementById("chat-window");
            const wrap = document.createElement("div");
            const label = document.createElement("div");
            const bubble = document.createElement("div");

            label.className = "bubble-label";
            label.textContent = role === "interviewer" ? "Interviewer" : "You";

            bubble.className = `bubble ${role}`;
            bubble.textContent = text;

            wrap.appendChild(label);
            wrap.appendChild(bubble);
            chat.appendChild(wrap);
            chat.scrollTop = chat.scrollHeight;

            return bubble;
        }

        function addTypingIndicator() {
            const chat = document.getElementById("chat-window");
            const indicator = document.createElement("div");
            indicator.className = "typing-indicator";
            indicator.id = "typing-indicator";
            indicator.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
            chat.appendChild(indicator);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById("typing-indicator");
            if (el) el.remove();
        }

        async function streamInto(bubble, url, body) {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let text = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                text += decoder.decode(value, { stream: true });
                bubble.textContent = text;
                document.getElementById("chat-window").scrollTop =
                    document.getElementById("chat-window").scrollHeight;
            }

            return text;
        }

        async function startSession() {
            const resume = document.getElementById("resume").value.trim();
            const jd = document.getElementById("jd").value.trim();

            if (!resume || !jd) {
                setStatus("Please fill in both fields before starting.");
                return;
            }

            const btn = document.getElementById("btn-start");
            btn.disabled = true;
            setStatus("Compressing context... this takes a moment.");

            const res = await fetch("/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ resume, jd })
            });

            const data = await res.json();

            if (data.error) {
                setStatus(data.error);
                btn.disabled = false;
                return;
            }

            sessionId = data.session_id;
            showPanel("interview");
            updateProgress(0);

            // Get first question
            addTypingIndicator();
            const bubble = addBubble("interviewer");
            removeTypingIndicator();

            await streamInto(bubble, "/first-question", { session_id: sessionId });
        }

        async function submitAnswer() {
            const input = document.getElementById("answer-input");
            const answer = input.value.trim();

            if (!answer) return;

            const sendBtn = document.getElementById("btn-send");
            sendBtn.disabled = true;
            input.disabled = true;

            addBubble("candidate", answer);
            input.value = "";

            turnCount++;
            updateProgress(turnCount);

            if (turnCount >= MAX_TURNS) {
                addTypingIndicator();
                await fetch("/answer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, answer })
                });
                removeTypingIndicator();
                await startDebrief();
                return;
            }

            addTypingIndicator();
            const bubble = addBubble("interviewer");
            removeTypingIndicator();

            await streamInto(bubble, "/answer", { session_id: sessionId, answer });

            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        async function startDebrief() {
            showPanel("debrief");
            const body = document.getElementById("debrief-body");
            body.textContent = "";

            const response = await fetch("/debrief", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                body.textContent += decoder.decode(value, { stream: true });
            }
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                submitAnswer();
            }
        }

        function restart() {
            sessionId = null;
            turnCount = 0;
            document.getElementById("chat-window").innerHTML = "";
            document.getElementById("debrief-body").textContent = "";
            document.getElementById("resume").value = "";
            document.getElementById("jd").value = "";
            document.getElementById("btn-start").disabled = false;
            setStatus("");
            updateProgress(0);
            showPanel("setup");
        }
    </script>
</body>

</html>
